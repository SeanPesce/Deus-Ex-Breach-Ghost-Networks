name: Fetch Ghost Network

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check whether today's Ghost Network already exists
        id: today
        shell: bash
        run: |
          today="$(date -u +%F)"
          echo "date=${today}" >> "$GITHUB_OUTPUT"
          if [[ -f "ghost_networks/${today}.json" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Ghost Network for ${today} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.today.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.today.outputs.exists != 'true'
        run: python -m pip install requests

      - name: Fetch current Ghost Network
        if: steps.today.outputs.exists != 'true'
        run: python scripts/get_ghost_network.py ghost_networks

      - name: Commit and push changes
        if: steps.today.outputs.exists != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ghost_networks
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add latest Ghost Network"
          git push